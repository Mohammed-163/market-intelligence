name: Weekly Competitor Collection

on:
  schedule:
    - cron: '0 0 * * 5' # Run every Friday at midnight
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install requirements
        run: pip install -r requirements.txt
        
      - name: Collect Data
        env:
          APIFY_1: ${{ secrets.APIFY_1 }}
          APIFY_2: ${{ secrets.APIFY_2 }}
          APIFY_3: ${{ secrets.APIFY_3 }}
          YOUTUBE_1: ${{ secrets.YOUTUBE_1 }}
          YOUTUBE_2: ${{ secrets.YOUTUBE_2 }}
        run: |
          # Test specific account
          python main.py --instagram "smart.lens.iq" --posts 5
          
          # Optional: keep discovery running
          # python main.py --discover "tech"
          
      - name: Upload Collected Data
        uses: actions/upload-artifact@v4
        with:
          name: market-data
          path: data/
          if-no-files-found: ignore
