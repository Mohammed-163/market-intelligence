name: Weekly Competitor Collection

on:
  schedule:
    - cron: '0 0 * * 5' # Run every Friday at midnight
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install requirements
        run: pip install -r requirements.txt
        
      - name: Discover Competitors and Analyze
        env:
          APIFY_1: ${{ secrets.APIFY_1 }}
          APIFY_2: ${{ secrets.APIFY_2 }}
          APIFY_3: ${{ secrets.APIFY_3 }}
          YOUTUBE_1: ${{ secrets.YOUTUBE_1 }}
          YOUTUBE_2: ${{ secrets.YOUTUBE_2 }}
          GEMINI_1: ${{ secrets.GEMINI_1 }}
          GEMINI_2: ${{ secrets.GEMINI_2 }}
        run: |
          python main.py --discover "tech" --analyze
          
      - name: Upload Database
        uses: actions/upload-artifact@v4
        with:
          name: market-db
          path: market_data.db
          if-no-files-found: ignore
