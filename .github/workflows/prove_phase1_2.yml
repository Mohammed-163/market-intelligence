name: Prove Phase 1 & 2

on:
  workflow_dispatch:

jobs:
  prove-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug Environment Setup
        env:
          IG_USER_VAR: ${{ vars.IG_USER }}
          IG_USER_SEC: ${{ secrets.IG_USER }}
          APIFY_1: ${{ secrets.APIFY_1 }}
          GEMINI_1: ${{ secrets.GEMINI_1 }}
          Y1: ${{ secrets.YOUTUBE_1 }}
          Y2: ${{ secrets.YOUTUBE_2 }}
          Y3: ${{ secrets.YOUTUBE_3 }}
          Y4: ${{ secrets.YOUTUBE_4 }}
          Y5: ${{ secrets.YOUTUBE_5 }}
        run: |
          echo "IG_USER exists: $(if [ -n "$IG_USER_VAR" ] || [ -n "$IG_USER_SEC" ]; then echo 'yes'; else echo 'no'; fi)"
          echo "APIFY configured: $(if [ -n "$APIFY_1" ]; then echo 'yes'; else echo 'no'; fi)"
          echo "GEMINI configured: $(if [ -n "$GEMINI_1" ]; then echo 'yes'; else echo 'no'; fi)"
          
          YT_COUNT=0
          [ -n "$Y1" ] && YT_COUNT=$((YT_COUNT+1))
          [ -n "$Y2" ] && YT_COUNT=$((YT_COUNT+1))
          [ -n "$Y3" ] && YT_COUNT=$((YT_COUNT+1))
          [ -n "$Y4" ] && YT_COUNT=$((YT_COUNT+1))
          [ -n "$Y5" ] && YT_COUNT=$((YT_COUNT+1))
          echo "YOUTUBE keys count: $YT_COUNT"

      - name: Run Phase 1 & 2 Proof Script
        env:
          IG_USER: ${{ vars.IG_USER || secrets.IG_USER }}
          APIFY_1: ${{ secrets.APIFY_1 }}
          APIFY_2: ${{ secrets.APIFY_2 }}
          APIFY_3: ${{ secrets.APIFY_3 }}
          YOUTUBE_1: ${{ secrets.YOUTUBE_1 }}
          YOUTUBE_2: ${{ secrets.YOUTUBE_2 }}
          YOUTUBE_3: ${{ secrets.YOUTUBE_3 }}
          YOUTUBE_4: ${{ secrets.YOUTUBE_4 }}
          YOUTUBE_5: ${{ secrets.YOUTUBE_5 }}
          GEMINI_1: ${{ secrets.GEMINI_1 }}
          GEMINI_2: ${{ secrets.GEMINI_2 }}
          GEMINI_3: ${{ secrets.GEMINI_3 }}
        run: |
          python prove_phase1_2.py > terminal.log 2>&1 || true
          cat terminal.log

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-evidence
          path: |
            terminal.log
            manifest.json
            data/manifests/**
            data/accounts/**
            data/competitors/**
            keyword_analysis.json
          retention-days: 5
